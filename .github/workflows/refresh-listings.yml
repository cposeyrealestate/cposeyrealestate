name: Refresh IDX Listings

on:
  schedule:
    # Run daily at 6 AM UTC (1 AM CT). Rotates through one property type
    # per day to stay under IDX Broker's 500-call/hour rate limit.
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest IDX listings
        run: node src/lib/fetch-all-listings.js
        env:
          IDX_API_KEY: ${{ secrets.IDX_API_KEY }}
          # Rotate through property types daily (Mon=0, Tue=1, ... Sun=6 mod 6)
          FETCH_ROTATE: 'true'

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/idx-map-listings.json public/data/idx-map-listings.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/idx-map-listings.json src/data/idx-all-listings.json src/data/idx-stats.json public/data/idx-map-listings.json
          git commit -m "chore: refresh IDX listing data [automated]"
          git pull --rebase
          git push
